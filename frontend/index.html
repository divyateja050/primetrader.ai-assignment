<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Dashboard</title>
    <!-- Premium sans-serif font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Minimal premium dark mode */
        :root {
            --bg-color: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --border: #334155;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            line-height: 1.5; 
            padding: 2rem; 
            display: flex; 
            justify-content: center; 
        }
        
        .container { max-width: 800px; width: 100%; }
        h1, h2, h3 { color: var(--text-main); margin-bottom: 1rem; font-weight: 600; }
        
        .card { 
            background: var(--surface); 
            padding: 2rem; 
            border-radius: var(--radius-md); 
            border: 1px solid var(--border); 
            box-shadow: var(--shadow); 
            margin-bottom: 2rem; 
            transition: transform 0.2s ease; 
        }
        .card:hover { transform: translateY(-2px); }
        
        form { display: flex; flex-direction: column; gap: 1rem; }
        
        input, select { 
            background: var(--bg-color); 
            border: 1px solid var(--border); 
            color: var(--text-main); 
            padding: 0.75rem 1rem; 
            border-radius: var(--radius-sm); 
            font-size: 1rem; 
            outline: none; 
            transition: border-color 0.2s; 
        }
        input:focus, select:focus { border-color: var(--primary); }
        
        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 0.75rem 1rem; 
            border-radius: var(--radius-sm); 
            font-size: 1rem; 
            font-weight: 500; 
            cursor: pointer; 
            transition: background-color 0.2s, transform 0.1s; 
        }
        button:hover { background: var(--primary-hover); }
        button:active { transform: scale(0.98); }
        button.danger { background: var(--danger); padding: 0.5rem 0.75rem; font-size: 0.9rem; }
        button.danger:hover { background: #dc2626; }
        button.btn-outline { background: transparent; border: 1px solid var(--border); }
        button.btn-outline:hover { background: var(--bg-color); }
        
        /* Views */
        #dashboard, #profile-view { display: none; }
        .auth-view { display: block; }
        
        /* Layouts */
        .auth-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; }
        @media (min-width: 768px) { .auth-grid { grid-template-columns: 1fr 1fr; } }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; }
        
        /* Tasks */
        .task-list { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
        .task-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--bg-color); 
            padding: 1rem 1.5rem; 
            border-radius: var(--radius-sm); 
            border: 1px solid var(--border); 
        }
        .task-info h3 { margin-bottom: 0.25rem; font-size: 1.1rem; }
        .task-info p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0; }
        .admin-badge { font-size: 0.75rem; background: var(--primary); padding: 0.2rem 0.5rem; border-radius: 4px; margin-bottom: 0.5rem; display: inline-block; font-weight: bold; }
        
        /* Errors */
        .error-msg { 
            background: rgba(239, 68, 68, 0.1); 
            color: var(--danger); 
            padding: 0.75rem; 
            border-radius: var(--radius-sm); 
            margin-bottom: 1rem; 
            border: 1px solid rgba(239, 68, 68, 0.2); 
            font-size: 0.9rem; 
            display: none; 
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Error Banner -->
        <div id="global-error" class="error-msg"></div>

        <!-- Auth View -->
        <div id="auth-view" class="auth-view">
            <h1 style="text-align: center; margin-bottom: 3rem;">Task Manager</h1>
            <div class="auth-grid">
                <!-- Login Form -->
                <div class="card">
                    <h2>Login</h2>
                    <form id="login-form">
                        <input type="email" id="login-email" placeholder="Email Address" required>
                        <input type="password" id="login-password" placeholder="Password" required>
                        <button type="submit">Sign In</button>
                    </form>
                </div>
                
                <!-- Register Form -->
                <div class="card">
                    <h2>Register</h2>
                    <form id="register-form">
                        <input type="text" id="reg-name" placeholder="Full Name" required>
                        <input type="email" id="reg-email" placeholder="Email Address" required>
                        <input type="password" id="reg-password" placeholder="Password" required>
                        <button type="submit" class="btn-outline">Create Account</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard">
            <div class="header">
                <h1 id="dashboard-title">My Tasks</h1>
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: flex-end;">
                    <button type="button" id="my-tasks-btn" class="btn-outline" style="display: none;">My Tasks</button>
                    <button type="button" id="admin-btn" class="btn-outline" style="display: none;">Admin Panel</button>
                    <button type="button" id="profile-btn" class="btn-outline">Profile</button>
                    <button type="button" id="logout-btn" class="btn-outline">Logout</button>
                </div>
            </div>
            
            <div id="profile-view" class="card" style="display: none;">
                <h3>Update Profile</h3>
                <form id="update-profile-form">
                    <input type="text" id="prof-name" placeholder="Full Name">
                    <input type="email" id="prof-email" placeholder="Email Address">
                    <input type="password" id="prof-password" placeholder="New Password (optional)">
                    <button type="submit">Save Changes</button>
                </form>
            </div>
            
            <div class="card" id="task-creator-panel">
                <h3>Create New Task</h3>
                <form id="create-task-form">
                    <input type="text" id="task-title" placeholder="Task Title" required>
                    <input type="text" id="task-desc" placeholder="Task Description (optional)">
                    <button type="submit">Add Task</button>
                </form>
            </div>
            
            <div class="card" id="task-editor-panel" style="display: none; border-color: var(--primary);">
                <h3>Edit Task</h3>
                <form id="edit-task-form">
                    <input type="hidden" id="edit-task-id">
                    <input type="text" id="edit-task-title" placeholder="Task Title" required>
                    <input type="text" id="edit-task-desc" placeholder="Task Description (optional)">
                    <select id="edit-task-status" style="margin-bottom: 0.5rem;" required>
                        <option value="pending">Pending</option>
                        <option value="in-progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                    <div style="display: flex; gap: 0.5rem;">
                        <button type="submit">Save Changes</button>
                        <button type="button" class="btn-outline" onclick="closeEditPanel()">Cancel</button>
                    </div>
                </form>
            </div>
            
            <div class="task-list" id="task-list">
                <!-- Javascript will inject list here -->
            </div>
        </div>
    </div>
    
    <script src="app.js?v=2"></script>
</body>
</html>
